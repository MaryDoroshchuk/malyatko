<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Child figure -->
  <g transform="translate(50, 50)">
    <!-- hair -->
    <ellipse cx="-10" cy="-44" rx="6" ry="7" fill="#7C5FDB" transform="rotate(-15,-10,-44)"/>
    <ellipse cx="0" cy="-47" rx="6" ry="7" fill="#7C5FDB"/>
    <ellipse cx="10" cy="-44" rx="6" ry="7" fill="#7C5FDB" transform="rotate(15,10,-44)"/>
    <!-- head -->
    <circle cx="0" cy="-30" r="22" fill="#9B8FEF"/>
    <!-- eyes -->
    <circle cx="-8" cy="-34" r="4" fill="#fff"/>
    <circle cx="8" cy="-34" r="4" fill="#fff"/>
    <circle cx="-8" cy="-34" r="2" fill="#5B4ACA"/>
    <circle cx="8" cy="-34" r="2" fill="#5B4ACA"/>
    <!-- cheeks -->
    <circle cx="-14" cy="-27" r="5" fill="#C4B8F8" opacity="0.6"/>
    <circle cx="14" cy="-27" r="5" fill="#C4B8F8" opacity="0.6"/>
    <!-- smile -->
    <path d="M-7 -22 Q0 -16 7 -22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <!-- body -->
    <rect x="-18" y="-8" width="36" height="36" rx="10" fill="#C4B8F8"/>
    <!-- shirt dot -->
    <circle cx="0" cy="6" r="3" fill="#9B8FEF"/>
    <!-- arms raised -->
    <path d="M-18 2 Q-38 -6 -42 -22" fill="none" stroke="#9B8FEF" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-42" cy="-22" r="5" fill="#9B8FEF"/>
    <path d="M18 2 Q38 -6 42 -22" fill="none" stroke="#9B8FEF" stroke-width="7" stroke-linecap="round"/>
    <circle cx="42" cy="-22" r="5" fill="#9B8FEF"/>
    <!-- legs -->
    <path d="M-9 28 Q-11 42 -13 50" fill="none" stroke="#9B8FEF" stroke-width="7" stroke-linecap="round"/>
    <path d="M9 28 Q11 42 13 50" fill="none" stroke="#9B8FEF" stroke-width="7" stroke-linecap="round"/>
    <!-- feet -->
    <ellipse cx="-14" cy="52" rx="8" ry="5" fill="#7C5FDB"/>
    <ellipse cx="14" cy="52" rx="8" ry="5" fill="#7C5FDB"/>
  </g>
  <!-- sparkles -->
  <text x="10" y="28" font-family="sans-serif" font-size="12" fill="#C4B8F8">✦</text>
  <text x="88" y="18" font-family="sans-serif" font-size="9" fill="#9B8FEF">✦</text>
  <!-- vertical divider -->
  <line x1="110" y1="18" x2="110" y2="82" stroke="#C4B8F8" stroke-width="1.5"/>
  <!-- text -->
  <text x="126" y="52" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5B4ACA">Малятко</text>
  <line x1="126" y1="62" x2="388" y2="62" stroke="#C4B8F8" stroke-width="1"/>
  <text x="126" y="78" font-family="Arial, sans-serif" font-size="11" fill="#9B8FEF" letter-spacing="2">ДОШКІЛЬНИЙ НАВЧАЛЬНИЙ ЗАКЛАД</text>
</svg>
